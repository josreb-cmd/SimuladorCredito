<!-- SIMULADOR DE CRÉDITO - ESTILO PORTFÓLIO SOLUÇÕES EFICAZES -->
<section id="simulador" style="margin-top:60px;">
  <div class="sim-container">
    <h1 class="sim-title">Simulador de Crédito</h1>
    <p class="sim-subtitle">Cálculo de Prestação & Tabela de Amortização</p>

    <div class="sim-grid">
      <div>
        <label>Capital (€)</label>
        <input type="number" id="capital" value="360000" step="0.01">
      </div>

      <div>
        <label>Taxa Anual (%)</label>
        <input type="number" id="taxa" value="2.55" step="0.0001">
      </div>

      <div>
        <label>Prazo (meses)</label>
        <input type="number" id="prazo" value="360">
      </div>

      <div>
        <label>Data de Início</label>
        <input type="date" id="dataInicio">
      </div>

      <div>
        <label>Imposto de Selo sobre Juros (Crédito ao Consumo)</label>
        <input type="checkbox" id="is">
      </div>
    </div>

    <button class="sim-btn" onclick="calcular()">Calcular</button>
    <button class="sim-btn" onclick="gerarPDF()">Gerar PDF</button>

    <!-- RESUMO PREMIUM EM 2 LINHAS -->
    <div class="sim-resumo" id="resumoLinha1"></div>
    <div class="sim-resumo" id="resumoLinha2"></div>

    <p class="sim-nota">
      • A última prestação ajusta cêntimos para fechar o saldo.<br>
      • Imposto de selo aplica 4% sobre os juros mensais.
    </p>

    <h2 class="sim-subtitle" style="margin-top:30px;">Plano de Amortização</h2>

    <div class="sim-table-wrapper">
      <table id="tabela">
        <thead>
          <tr>
            <th>Período</th>
            <th>Data</th>
            <th>Saldo Inicial</th>
            <th>Juros</th>
            <th>Amortização</th>
            <th>Imposto Selo</th>
            <th>Saldo Final</th>
            <th>Prestação Total</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</section>

<style>
/* ---------- CONTAINER ---------- */
.sim-container {
  max-width: 1100px;
  margin: 0 auto;
  background: #ffffff;
  padding: 35px;
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

/* ---------- TITULOS ---------- */
.sim-title {
  font-size: 2rem;
  color: #1a2a6c;
  margin-bottom: 5px;
  text-align: center;
}

.sim-subtitle {
  font-size: 1.1rem;
  color: #3a4a7a;
  text-align: center;
  margin-bottom: 25px;
}

/* ---------- GRID ---------- */
.sim-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 18px;
  margin-bottom: 25px;
}

.sim-grid input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #cfd6e4;
  border-radius: 6px;
  font-size: 1em;
}

/* ---------- BOTÃO ---------- */
.sim-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #1a2a6c, #1a73e8);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1.1rem;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.2s;
}

.sim-btn:hover {
  opacity: 0.9;
}

/* ---------- CARDS RESUMO ---------- */
.sim-resumo {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 25px;
}

.sim-resumo .card {
  background: #f0f4ff;
  padding: 14px 20px;
  border-radius: 8px;
  min-width: 220px;
  border-left: 4px solid #1a73e8;
  flex: 1;
}

.sim-resumo .valor {
  font-size: 1.3rem;
  font-weight: bold;
  margin-top: 4px;
}

/* ---------- TABELA ---------- */
.sim-table-wrapper {
  width: 100%;
  overflow-x: auto;
  margin-top: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}

th, td {
  border: 1px solid #d8dfea;
  padding: 8px;
  text-align: right;
}

th {
  background: #e9edf5;
  color: #1a2a6c;
  font-weight: bold;
}

td:first-child, th:first-child,
td:nth-child(2), th:nth-child(2) {
  text-align: center;
}

/* ---------- NOTA ---------- */
.sim-nota {
  font-size: 0.85rem;
  color: #555;
  margin-top: 12px;
}

/* ---------- PDF FIX ---------- */
@media print {

  body * {
    visibility: hidden;
  }

  #simulador, #simulador * {
    visibility: visible;
  }

  #simulador {
    position: static;
    width: 100%;
    margin: 0;
    padding: 0;
  }

  .sim-container {
    max-width: 100%;
    padding: 10px;
    box-shadow: none;
    border-radius: 0;
  }

  .sim-table-wrapper {
    overflow: visible;
  }

  table {
    width: 100%;
    min-width: 0;
    font-size: 11px;
  }

  th, td {
    padding: 4px;
  }

  @page {
    size: A4 landscape;
    margin: 10mm;
  }
}

/* ---------- MOBILE ---------- */
@media (max-width: 600px) {
  .sim-container {
    padding: 20px;
  }

  .sim-title {
    font-size: 1.6rem;
  }

  .sim-resumo .card {
    min-width: 100%;
  }
}
</style>

<script>
/* Helpers */
const fmt = v => v.toLocaleString("pt-PT", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

const addMonths = (date, m) => {
  const d = new Date(date);
  const day = d.getDate();
  d.setMonth(d.getMonth() + m);
  if (d.getDate() < day) d.setDate(0);
  return d;
};

const pmt = (rate, nper, pv) =>
  rate === 0 ? -(pv / nper) :
  -(rate * pv * Math.pow(1 + rate, nper)) / (Math.pow(1 + rate, nper) - 1);

/* PDF */
function gerarPDF() {
  window.print();
}

/* Cálculo */
function calcular() {
  const capital = parseFloat(document.getElementById("capital").value);
  const taxa = parseFloat(document.getElementById("taxa").value) / 100;
  const prazo = parseInt(document.getElementById("prazo").value);
  const aplicarIS = document.getElementById("is").checked;
  const dataInicio = document.getElementById("dataInicio").value
    ? new Date(document.getElementById("dataInicio").value)
    : null;

  if (!capital || !prazo) {
    alert("Preencha Capital e Prazo.");
    return;
  }

  const taxaMensal = taxa / 12;
  let prestacaoBase = -pmt(taxaMensal, prazo, capital);

  let saldo = capital;
  let totalJuros = 0, totalIS = 0, totalPago = 0;

  let impostoPrimeiraPrestacao = 0;

  const tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  for (let i = 1; i <= prazo; i++) {
    const juros = saldo * taxaMensal;
    let amort = prestacaoBase - juros;
    let imposto = aplicarIS ? juros * 0.04 : 0;
    let prestacaoTotal = prestacaoBase + imposto;
    let saldoFinal = saldo - amort;

    if (i === 1) impostoPrimeiraPrestacao = imposto;

    if (i === prazo) {
      amort = saldo;
      prestacaoBase = juros + amort;
      prestacaoTotal = prestacaoBase + imposto;
      saldoFinal = 0;
    }

    totalJuros += juros;
    totalIS += imposto;
    totalPago += prestacaoTotal;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i}</td>
      <td>${dataInicio ? addMonths(dataInicio, i - 1).toLocaleDateString("pt-PT") : "-"}</td>
      <td>${fmt(saldo)}</td>
      <td>${fmt(juros)}</td>
      <td>${fmt(amort)}</td>
      <td>${fmt(imposto)}</td>
      <td>${fmt(saldoFinal)}</td>
      <td>${fmt(prestacaoTotal)}</td>
    `;
    tbody.appendChild(tr);

    saldo = saldoFinal;
  }

  /* ---------- RESUMO PREMIUM EM 2 LINHAS ---------- */

  document.getElementById("resumoLinha1").innerHTML = `
    <div class="card">
      <span>Prestação Mensal (sem IS)</span>
      <span class="valor">${fmt(prestacaoBase)} €</span>
    </div>

    <div class="card">
      <span>Imposto Selo primeira Prestação</span>
      <span class="valor">${fmt(impostoPrimeiraPrestacao)} €</span>
    </div>

    <div class="card">
      <span>Prestação Total</span>
      <span class="valor">${fmt(prestacaoBase + impostoPrimeiraPrestacao)} €</span>
    </div>
  `;

  document.getElementById("resumoLinha2").innerHTML = `
    <div class="card">
      <span>Total Juros</span>
      <span class="valor">${fmt(totalJuros)} €</span>
    </div>

    <div class="card">
      <span>Total Imposto de Selo</span>
      <span class="valor">${fmt(totalIS)} €</span>
    </div>

    <div class="card">
      <span>Total Pago</span>
      <span class="valor">${fmt(totalPago)} €</span>
    </div>
  `;
}

calcular();
</script>
